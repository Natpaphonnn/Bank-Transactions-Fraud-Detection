<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b3a2a"/>
      <stop offset="100%" stop-color="#c4956a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Accent line -->
  <rect x="60" y="100" width="4" height="200" fill="url(#accent)" rx="2"/>

  <!-- Title -->
  <text x="84" y="155" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" letter-spacing="-1">Bank Transaction</text>
  <text x="84" y="210" fill="#c4956a" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" letter-spacing="-1">Fraud Detection</text>

  <!-- Subtitle -->
  <text x="84" y="250" fill="rgba(255,255,255,0.5)" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400">End-to-End Unsupervised Anomaly Detection Pipeline</text>

  <!-- Tags -->
  <g transform="translate(84, 275)">
    <rect width="95" height="28" fill="rgba(196,149,106,0.15)" rx="14"/>
    <text x="47" y="18" fill="#c4956a" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">ML Models</text>

    <rect x="105" width="95" height="28" fill="rgba(196,149,106,0.15)" rx="14"/>
    <text x="152" y="18" fill="#c4956a" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Rule Engine</text>

    <rect x="210" width="105" height="28" fill="rgba(196,149,106,0.15)" rx="14"/>
    <text x="262" y="18" fill="#c4956a" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Hybrid Score</text>

    <rect x="325" width="95" height="28" fill="rgba(196,149,106,0.15)" rx="14"/>
    <text x="372" y="18" fill="#c4956a" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Dashboard</text>
  </g>

  <!-- Right side: stats cards -->
  <g transform="translate(700, 90)">
    <!-- Card 1 -->
    <rect width="220" height="80" fill="rgba(255,255,255,0.04)" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="30" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-transform="uppercase" letter-spacing="1.5">Transactions</text>
    <text x="20" y="60" fill="#ffffff" font-family="system-ui, sans-serif" font-size="32" font-weight="900">50,000</text>

    <!-- Card 2 -->
    <rect y="92" width="220" height="80" fill="rgba(255,255,255,0.04)" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="122" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">Consensus Anomalies</text>
    <text x="20" y="152" fill="#ef4444" font-family="system-ui, sans-serif" font-size="32" font-weight="900">190</text>

    <!-- Card 3 -->
    <rect y="184" width="220" height="80" fill="rgba(255,255,255,0.04)" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="214" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">Rule Recall</text>
    <text x="20" y="244" fill="#c4956a" font-family="system-ui, sans-serif" font-size="32" font-weight="900">94.7%</text>
  </g>

  <!-- Right side: second column -->
  <g transform="translate(940, 90)">
    <rect width="220" height="80" fill="rgba(255,255,255,0.04)" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="30" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">ML Models</text>
    <text x="20" y="60" fill="#ffffff" font-family="system-ui, sans-serif" font-size="32" font-weight="900">3</text>

    <rect y="92" width="220" height="80" fill="rgba(255,255,255,0.04)" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="122" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">Expert Rules</text>
    <text x="20" y="152" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="32" font-weight="900">7</text>

    <rect y="184" width="220" height="80" fill="rgba(255,255,255,0.04)" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="20" y="214" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">Critical Alerts</text>
    <text x="20" y="244" fill="#ef4444" font-family="system-ui, sans-serif" font-size="32" font-weight="900">24</text>
  </g>
</svg>
